<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 370" width="800" height="370">
  <defs>
    <style>
      .bg { fill: #0d1117; stroke: #30363d; stroke-width: 1; rx: 8px; }
      .text { font-family: 'ui-monospace', 'SFMono-Regular', 'Menlo', 'Consolas', 'Liberation Mono', monospace; font-size: 15px; fill: #c9d1d9; font-weight: 500; }
      .prompt { fill: #7ee787; }
      .path { fill: #79c0ff; }
      .cmd { fill: #c9d1d9; font-weight: 600; }
      .ok { fill: #a5d6ff; font-weight: 600; }
      .warn { fill: #f2cc60; }
      .success { fill: #3fb950; font-weight: 600; }
      .dim { fill: #8b949e; }
      
      .line { opacity: 0; animation: showLine 0.1s forwards; }
      
      .cursor {
        fill: #c9d1d9;
        opacity: 0;
        animation: showLine 0.1s forwards, blink 1s step-end infinite;
      }
      
      @keyframes showLine {
        to { opacity: 1; }
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
    </style>
  </defs>
  
  <!-- Terminal Window Background -->
  <rect class="bg" width="100%" height="100%" />
  
  <!-- Mac-style Window Controls -->
  <circle cx="20" cy="20" r="6" fill="#ff5f56" />
  <circle cx="40" cy="20" r="6" fill="#ffbd2e" />
  <circle cx="60" cy="20" r="6" fill="#27c93f" />
  <line x1="0" y1="40" x2="800" y2="40" stroke="#30363d" stroke-width="1" />

  <!-- Terminal Content -->
  <g transform="translate(20, 75)">
    
    <!-- 1. Initialization Command -->
    <g class="line" style="animation-delay: 0.5s">
      <text class="text" x="0" y="0">
        <tspan class="prompt">jay@macbook</tspan><tspan class="dim">:</tspan><tspan class="path">~/forgeguard</tspan><tspan class="dim">$</tspan> <tspan class="cmd">./forgeguard --orchestrate</tspan>
      </text>
    </g>
    
    <!-- 2. Logs -->
    <text class="text line" style="animation-delay: 1.2s" x="0" y="30">
      <tspan class="ok">[INFO]</tspan> Initializing AI Security Orchestrator (v1.0.0)...
    </text>
    
    <text class="text line" style="animation-delay: 1.8s" x="0" y="55">
      <tspan class="ok">[INFO]</tspan> Connecting to Firebase environment... <tspan class="success">SUCCESS</tspan>
    </text>
    
    <text class="text line" style="animation-delay: 3.0s" x="0" y="80">
      <tspan class="warn">[WARN]</tspan> Unsecured data models detected in target architecture.
    </text>

    <text class="text line" style="animation-delay: 4.5s" x="0" y="105">
      <tspan class="ok">[INFO]</tspan> Streaming LLM analysis over autonomous tunnel...
    </text>

    <!-- 3. Simulated Code Block Generation -->
    <text class="text line" style="animation-delay: 5.2s" x="0" y="140">
      <tspan class="dim">      ></tspan> <tspan class="success">rules_version = '2';</tspan>
    </text>
    <text class="text line" style="animation-delay: 5.4s" x="0" y="165">
      <tspan class="dim">      ></tspan> <tspan class="success">service cloud.firestore {</tspan>
    </text>
    <text class="text line" style="animation-delay: 5.6s" x="0" y="190">
      <tspan class="dim">      ></tspan> <tspan class="success">  match /databases/{database}/documents {</tspan>
    </text>
    <text class="text line" style="animation-delay: 6.2s" x="0" y="215">
      <tspan class="dim">      ></tspan> <tspan class="success">    // Autonomous security constraints generated.</tspan>
    </text>

    <!-- 4. Final Audit Logs -->
    <text class="text line" style="animation-delay: 7.5s" x="0" y="255">
      <tspan class="ok">[INFO]</tspan> Audit passed. Security score: <tspan class="success">100/100</tspan>.
    </text>

    <!-- 5. Final Prompt & Blinking Cursor -->
    <g class="line" style="animation-delay: 8.5s">
      <text class="text" x="0" y="285">
        <tspan class="prompt">jay@macbook</tspan><tspan class="dim">:</tspan><tspan class="path">~/forgeguard</tspan><tspan class="dim">$</tspan>
      </text>
      <!-- Blinking Cursor -->
      <rect class="cursor" style="animation-delay: 8.5s" x="185" y="271" width="8" height="17" />
    </g>
  </g>
</svg>
